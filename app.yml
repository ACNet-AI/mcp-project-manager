# MCP项目管理器 - GitHub App配置清单
# 用于自动管理MCP服务器项目的注册、验证和发布

# 订阅的GitHub事件列表
default_events:
  - issues
  - pull_request           # PR事件：验证项目结构
  - push                   # Push事件：更新注册表
  - release                # Release事件：版本管理
  - repository             # Repository事件：新项目添加
  - create                 # 分支/标签创建事件

# GitHub App所需权限
default_permissions:
  # 仓库内容：读写文件、提交、分支、发布版本
  contents: write
  
  # Issues：项目验证反馈
  issues: write
  
  # Pull Requests：自动验证和合并
  pull_requests: write
  
  # 仓库元数据：读取基本信息
  metadata: read
  
  # 提交状态：CI/CD状态检查
  statuses: write
  
  # 检查套件：运行自动化检查
  checks: write
  
  # 仓库管理：项目设置
  administration: read
  
  # 组织项目：管理项目板
  repository_projects: write

# App基本信息
name: MCP Project Manager
url: https://github.com/mcp-servers-hub
description: 自动化MCP服务器项目的注册、验证和发布管理
public: true

